# Usage (from this directory):
#   Set OPENROUTER_API_KEY in .env (see .env.example), then:
#   docker compose up --build
#
# First backend start: imports all images under eval/test_images through the vision API into the DB
# (same as python eval/import_test_set_to_db.py --all-images). Later starts skip rows already
# present. SKIP_DB_SEED=1 disables. Without an API key, seed is skipped (empty library).
#
# Or from repo root:
#   docker compose -f deploy/docker-compose.yml --project-directory deploy up --build
#
# App: http://localhost:8080  (API proxied at /api; backend also on :8000)

services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - fashion_data:/data
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/appdata/library.db
      UPLOAD_DIR: /data/uploads
      DATA_DIR: /data/appdata
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080,http://localhost:8000}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-20971520}
      SKIP_DB_SEED: ${SKIP_DB_SEED:-0}
      EVAL_IMPORT_DELAY_SEC: ${EVAL_IMPORT_DELAY_SEC:-0.35}
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  fashion_data:
